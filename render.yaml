services:
  - type: web
    name: saving-extincting-animal
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: flask --app app db upgrade && flask --app app seed && gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: saving-extincting-animal-db
          property: connectionString

databases:
  - name: saving-extincting-animal-db
    plan: free
